services:

  mysql:
    image: mysql:8.0
    container_name: production-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: production_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - production-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend/production-system
    container_name: production-backend
    ports:
      - "8086:8085"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: monSecretJWTpourProductionSystemeQuiEstLong256bits
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - production-network

  frontend:
    build: ./frontend
    container_name: production-frontend
    ports:
      - "4201:80"
    depends_on:
      - backend
    networks:
      - production-network

volumes:
  mysql_data:

networks:
  production-network:
    driver: bridge